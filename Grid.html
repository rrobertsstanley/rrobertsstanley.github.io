<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Aptitude Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0ddd5;
    --border2: #ccc9be;
    --text: #1a1915;
    --text2: #6b6860;
    --text3: #a09d97;
    --accent: #1e3a5f;
    --accent-mid: #7fa3c4;
    --hit: #1a5e3a;
    --hit-bg: #e6f4ec;
    --miss: #6b1e1e;
    --miss-bg: #f4e6e6;
    --hl-band: rgba(30,58,95,0.07);
    --hl-cell: #1e3a5f;
    --hl-alt: #2d5a8e;
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    padding: 16px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface); display: flex; align-items: baseline; gap: 14px;
  }
  header h1 { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; letter-spacing: 0.04em; }
  .hdr-range { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .hdr-hint { margin-left: auto; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  #game-screen { flex: 1; display: flex; overflow: hidden; }

  #grid-panel {
    flex: 0 0 auto; overflow: auto;
    background: var(--surface); border-right: 1px solid var(--border); padding: 14px;
  }

  table { border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 8.5px; }
  td, th {
    width: 17px; height: 17px; text-align: center; line-height: 17px;
    border: 0.5px solid var(--border); color: var(--text2);
    transition: background 0.12s; white-space: nowrap;
  }
  th { background: var(--surface2); color: var(--text); font-weight: 500; position: sticky; }
  thead th { top: 0; z-index: 2; }
  tbody th { left: 0; z-index: 1; }
  thead th:first-child { left: 0; z-index: 3; }

  td.hr { background: var(--hl-band); color: var(--text); }
  td.hc { background: var(--hl-band); color: var(--text); }
  td.hx { background: var(--hl-cell); color: #fff; font-weight: 500; }
  td.hx-alt { background: var(--hl-alt); color: #fff; font-weight: 400; opacity: 0.6; }

  #right-panel {
    flex: 1; display: flex; flex-direction: column;
    padding: 24px 28px; gap: 18px; overflow-y: auto; max-width: 460px;
  }

  .progress-row { display: flex; align-items: center; gap: 12px; }
  .progress-bar-wrap { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  #progress-bar { height: 100%; width: 0%; background: var(--border2); border-radius: 1px; transition: width 0.3s; }
  .prog-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); white-space: nowrap; }
  #sc-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 36px; text-align: right; }

  .question-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
  }
  .q-label {
    font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px;
  }
  .q-main {
    font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 300;
    color: var(--text); margin-bottom: 8px;
  }
  .q-main span { color: var(--accent); font-weight: 500; }
  .q-sub { font-size: 11px; color: var(--text2); display: flex; gap: 18px; font-family: 'DM Mono', monospace; }
  .q-sub span { color: var(--text3); margin-right: 3px; }

  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex; align-items: center; gap: 11px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
    font-size: 14px; font-family: 'DM Mono', monospace; color: var(--text); user-select: none;
  }
  .opt:hover:not(.locked) { background: var(--surface2); border-color: var(--border2); }
  .opt:active:not(.locked) { transform: scale(0.99); }
  .key-badge {
    width: 20px; height: 20px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text3); font-weight: 500; flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .opt.correct { background: var(--hit-bg); border-color: #8ec8a8; }
  .opt.correct .key-badge { background: var(--hit-bg); border-color: #8ec8a8; color: var(--hit); }
  .opt.correct .val { color: var(--hit); font-weight: 500; }
  .opt.wrong { background: var(--miss-bg); border-color: #e0a0a0; }
  .opt.wrong .key-badge { background: var(--miss-bg); border-color: #e0a0a0; color: var(--miss); }
  .opt.wrong .val { color: var(--miss); }
  .opt.reveal { background: var(--hit-bg); border-color: #8ec8a8; }
  .opt.reveal .val { color: var(--hit); font-weight: 500; }

  .feedback { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); min-height: 16px; }
  .feedback.good { color: var(--hit); }
  .feedback.bad { color: var(--miss); }

  #next-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: background 0.1s; display: none;
  }
  #next-btn:hover { background: var(--surface2); }

  #results-screen {
    display: none; flex: 1; align-items: flex-start;
    justify-content: center; padding: 40px 32px; overflow-y: auto;
  }
  .res-inner { max-width: 480px; width: 100%; }
  .res-tag { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }
  .res-pct { font-family: 'DM Mono', monospace; font-size: 64px; font-weight: 300; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .res-sub { font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; margin-bottom: 28px; }
  .res-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .scard { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; text-align: center; }
  .scard-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .scard-val { font-size: 20px; font-family: 'DM Mono', monospace; font-weight: 400; color: var(--text); }
  .res-breakdown { margin-bottom: 28px; }
  #restart-btn {
    width: 100%; padding: 11px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer;
  }
  #restart-btn:hover { background: var(--surface2); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 800px) {
    #game-screen { flex-direction: column; }
    #grid-panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 44vh; }
    #right-panel { max-width: 100%; }
    .hdr-hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>grid trainer</h1>
  <span class="hdr-range" id="header-range">−17 → +17</span>
  <div class="hdr-hint">keys 1–5 to answer &nbsp;·&nbsp; enter / space for next</div>
</header>

<main id="game-screen">
  <div id="grid-panel"><table id="grid-table"></table></div>

  <div id="right-panel">
    <div class="progress-row">
      <span class="prog-label" id="sc-q">1 of 10</span>
      <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
      <span id="sc-time">0.0s</span>
    </div>

    <div class="question-box">
      <div class="q-label">find the grid value at</div>
      <div class="q-main"><span id="q-r">—</span> , <span id="q-c">—</span></div>
      <div class="q-sub">
        <div><span>row</span><strong id="q-row-val">—</strong></div>
        <div><span>col</span><strong id="q-col-val">—</strong></div>
      </div>
    </div>

    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="next-btn">next question →</button>
  </div>
</main>

<div id="results-screen">
  <div class="res-inner">
    <div class="res-tag">round complete</div>
    <div class="res-pct" id="res-pct">—</div>
    <div class="res-sub" id="res-correct">— / 10 correct</div>
    <div class="res-cards">
      <div class="scard"><div class="scard-label">total time</div><div class="scard-val" id="res-total-time">—</div></div>
      <div class="scard"><div class="scard-label">avg / q</div><div class="scard-val" id="res-avg-time">—</div></div>
      <div class="scard"><div class="scard-label">best</div><div class="scard-val" id="res-best-time">—</div></div>
    </div>
    <div class="res-breakdown" id="res-breakdown"></div>
    <button id="restart-btn">new round →</button>
  </div>
</div>

<script>
const QPR = 10;
const MAX_OFFSET = 4;

function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function fmtSec(ms) { return (ms / 1000).toFixed(1) + 's'; }

function gridVal(r, c) {
  let v = r + c;
  while (v > 10) v -= 20;
  while (v < -10) v += 20;
  return v;
}

let axisMin, axisMax;
let roundScore = 0, questionNum = 0;
let roundStartTime, questionStartTime;
let questionTimes = [], questionResults = [];
let curR, curC, correctAns, answered = false;
let timerInterval;

function pickOffset() {
  let last = parseInt(sessionStorage.getItem('lastOffset') || '999');
  let o;
  do { o = rnd(-MAX_OFFSET, MAX_OFFSET); } while (o === last);
  sessionStorage.setItem('lastOffset', o);
  return o;
}

function startRound() {
  const offset = pickOffset();
  axisMin = -17 + offset;
  axisMax = 17 + offset;
  roundScore = 0; questionNum = 0;
  questionTimes = []; questionResults = [];

  const sign = offset >= 0 ? '+' : '';
  document.getElementById('header-range').textContent = `${axisMin} → ${axisMax}`;
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  buildGrid();

  roundStartTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.getElementById('sc-time').textContent = fmtSec(Date.now() - roundStartTime);
  }, 100);

  startQuestion();
}

function buildGrid() {
  const t = document.getElementById('grid-table');
  let html = '<thead><tr><th></th>';
  for (let c = axisMin; c <= axisMax; c++) html += `<th>${c}</th>`;
  html += '</tr></thead><tbody>';
  for (let r = axisMin; r <= axisMax; r++) {
    html += `<tr><th>${r}</th>`;
    for (let c = axisMin; c <= axisMax; c++) {
      html += `<td data-r="${r}" data-c="${c}">${gridVal(r,c)}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  t.innerHTML = html;
}

function highlightGrid(r, c) {
  // The mirror cell swaps row/col — same value due to commutativity of addition
  const mr = c, mc = r;
  const hasMirror = !(mr === r && mc === c);

  document.querySelectorAll('#grid-table td').forEach(el => {
    el.className = '';
    const er = +el.dataset.r, ec = +el.dataset.c;
    if (er === r && ec === c) {
      el.classList.add('hx');
    } else if (hasMirror && er === mr && ec === mc) {
      el.classList.add('hx-alt');
    } else if (er === r || (hasMirror && er === mr)) {
      el.classList.add('hr');
    } else if (ec === c || (hasMirror && ec === mc)) {
      el.classList.add('hc');
    }
  });
  const primary = document.querySelector(`#grid-table td[data-r="${r}"][data-c="${c}"]`);
  if (primary) primary.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
}

function clearHighlight() {
  document.querySelectorAll('#grid-table td').forEach(el => el.className = '');
}

function startQuestion() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  clearHighlight();

  questionStartTime = Date.now();

  curR = rnd(axisMin, axisMax);
  curC = rnd(axisMin, axisMax);
  correctAns = gridVal(curR, curC);

  document.getElementById('q-r').textContent = curR;
  document.getElementById('q-c').textContent = curC;
  document.getElementById('q-row-val').textContent = curR;
  document.getElementById('q-col-val').textContent = curC;
  document.getElementById('sc-q').textContent = `${questionNum + 1} of ${QPR}`;
  document.getElementById('progress-bar').style.width = `${(questionNum / QPR) * 100}%`;

  const opts = new Set([correctAns]);
  let tries = 0;
  while (opts.size < 5 && tries < 300) {
    tries++;
    const delta = rnd(-5, 5);
    if (delta === 0) continue;
    const cand = correctAns + delta;
    if (cand >= -10 && cand <= 10) opts.add(cand);
  }
  while (opts.size < 5) {
    for (let v = -10; v <= 10; v++) { if (!opts.has(v)) { opts.add(v); break; } }
  }
  const shuffled = [...opts].sort(() => Math.random() - 0.5);

  const container = document.getElementById('options');
  container.innerHTML = '';
  shuffled.forEach((val, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.dataset.val = val;
    btn.innerHTML = `<span class="key-badge">${i+1}</span><span class="val">${val}</span>`;
    btn.addEventListener('click', () => selectAnswer(val, btn));
    container.appendChild(btn);
  });
}

function selectAnswer(val, btn) {
  if (answered) return;
  answered = true;

  const elapsed = Date.now() - questionStartTime;
  questionTimes.push(elapsed);
  const ok = val == correctAns;
  questionResults.push({ ms: elapsed, correct: ok, r: curR, c: curC, given: +val, answer: correctAns });

  document.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));

  if (ok) {
    roundScore++;
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = '✓  correct';
    document.getElementById('feedback').className = 'feedback good';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(o => {
      if (+o.dataset.val == correctAns) o.classList.add('reveal');
    });
    document.getElementById('feedback').textContent = `✗  answer was ${correctAns}`;
    document.getElementById('feedback').className = 'feedback bad';
  }

  highlightGrid(curR, curC);

  questionNum++;
  document.getElementById('next-btn').textContent = questionNum >= QPR ? 'see results →' : 'next question →';
  document.getElementById('next-btn').style.display = 'block';
}

function showResults() {
  clearInterval(timerInterval);
  const totalMs = Date.now() - roundStartTime;
  const avgMs = questionTimes.reduce((a, b) => a + b, 0) / questionTimes.length;
  const bestMs = Math.min(...questionTimes);
  const pct = Math.round(roundScore / QPR * 100);

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = `${roundScore} / ${QPR} correct`;
  document.getElementById('res-total-time').textContent = fmtSec(totalMs);
  document.getElementById('res-avg-time').textContent = fmtSec(avgMs);
  document.getElementById('res-best-time').textContent = fmtSec(bestMs);

  const maxMs = Math.max(...questionTimes);
  let rows = '';
  questionResults.forEach((qr, i) => {
    const barW = Math.round(qr.ms / maxMs * 100);
    const col = qr.correct ? 'var(--hit)' : 'var(--miss)';
    const mk = qr.correct ? '✓' : '✗';
    rows += `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:0.5px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;">
      <span style="color:${col};width:14px;">${mk}</span>
      <span style="color:var(--text3);width:28px;">q${i+1}</span>
      <span style="color:var(--text2);width:40px;">${fmtSec(qr.ms)}</span>
      <div style="height:3px;border-radius:2px;background:var(--border);flex:1;overflow:hidden;">
        <div style="height:100%;width:${barW}%;background:${col};border-radius:2px;opacity:0.55;"></div>
      </div>
      <span style="color:var(--text3);width:58px;text-align:right;">${qr.r} , ${qr.c}</span>
    </div>`;
  });
  document.getElementById('res-breakdown').innerHTML = rows;

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'flex';
}

document.getElementById('next-btn').addEventListener('click', () => {
  questionNum >= QPR ? showResults() : startQuestion();
});
document.getElementById('restart-btn').addEventListener('click', startRound);

document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '5') {
    const opts = document.querySelectorAll('.opt');
    const idx = +e.key - 1;
    if (opts[idx] && !answered) opts[idx].click();
  }
  if ((e.key === 'Enter' || e.key === ' ') && answered) {
    document.getElementById('next-btn').click();
    e.preventDefault();
  }
});

startRound();
</script>
</body>
</html>
